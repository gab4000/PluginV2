feature.milestones.tutorial.name=Tutoriel d'OpenMC
feature.milestones.tutorial.description.1=<gray>Découvrez <light_purple>OpenMC</light_purple> !</gray>
feature.milestones.tutorial.description.2=<gray>Passez en revue les <light_purple>features</light_purple></gray>
feature.milestones.tutorial.description.3=<dark_gray><italic>Les villes, les contests, l'adminshop, les quêtes, ...</italic></dark_gray>
feature.milestones.tutorial.description.4=<gray>Idéal pour se lancer dans l'aventure !</gray>

feature.milestones.tutorial.hologram.icon=%1$s
feature.milestones.tutorial.hologram.welcome=<white>Bienvenue sur </white><light_purple>OpenMC V2</light_purple><white>!</white>
feature.milestones.tutorial.hologram.based_on=<white>Cette version est basée sur les </white><dark_green>villes</dark_green>
feature.milestones.tutorial.hologram.how_to=<white>Pour accéder au tutoriel, utilisez la commande </white><green>/milestones</green><white>.</white>
feature.milestones.tutorial.hologram.server=<white>C'est votre </white><light_purple>serveur</light_purple><white>!</white>
feature.milestones.tutorial.hologram.separator=<dark_gray><strikethrough>                                  </strikethrough></dark_gray>
feature.milestones.tutorial.hologram.links=<white>Liens utiles : </white><dark_purple>/socials</dark_purple>

feature.milestones.tutorial.quest.spare_bank.name=Déposer de l'argent à la banque
feature.milestones.tutorial.quest.spare_bank.description.1=<white>Tapez </white><light_purple>/bank</light_purple><white> ou bien allez dans le </white><light_purple>menu principal (/menu)</light_purple><white> pour pouvoir ouvrir le menu</white>
feature.milestones.tutorial.quest.spare_bank.description.2=<dark_gray><italic>Une méthode compétitive pour gagner des grosses récompenses !</italic></dark_gray>
feature.milestones.tutorial.quest.spare_bank.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Les </white><aqua>banques</aqua><white> peuvent stocker une quantité infinie d'argent et protègent celui-ci si vous mourrez ! Personnalisons maintenant l'expérience de jeu grâce aux paramètres !</white>

feature.milestones.tutorial.quest.sell_buy.name=Acheter ou vendre une ressource à l'adminshop
feature.milestones.tutorial.quest.sell_buy.description.1=<white>Tapez </white><red>/adminshop</red><white> ou bien allez dans le </white><light_purple>menu principal /menu</light_purple><white> pour pouvoir vendre ou acheter une ressource</white>
feature.milestones.tutorial.quest.sell_buy.description.2=<dark_gray><italic>C'est le début de la richesse !</italic></dark_gray>
feature.milestones.tutorial.quest.sell_buy.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! L'</white><red>adminshop</red><white> propose divers objets afin de pouvoir build, ou faire de l'argent ! Cependant, lorsque vous mourrez vous perdez </white>%2$s<white>% de votre argent ! Il est donc important de faire attention à votre peau, ou alors de déposer de l'argent dans votre banque !</white>

feature.milestones.tutorial.quest.open_settings.name=Ouvrir le menu des paramètres
feature.milestones.tutorial.quest.open_settings.description.1=<white>Tapez </white><light_purple>/settings</light_purple><white> ou bien allez dans le </white><light_purple>menu principal (/menu)</light_purple><white> pour pouvoir ouvrir le menu</white>
feature.milestones.tutorial.quest.open_settings.description.2=<dark_gray><italic>Cela va vous permettre de configurer votre expérience de jeu !</italic></dark_gray>
feature.milestones.tutorial.quest.open_settings.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Les </white><blue>paramètres</blue><white> customisent votre jeu, ils peuvent être utiles dans certains cas, comme pour bloquer des demandes d'amis, ... Sujet à part, vous pouvez passer en mode compétition grâce aux </white><gold>contests</gold><white>, une sorte de concours hebdomadaire !</white>

feature.milestones.tutorial.quest.open_quest.name=Ouvrir le menu des quêtes
feature.milestones.tutorial.quest.open_quest.description.1=<white>Tapez </white><light_purple>/quests</light_purple><white> ou bien allez dans le </white><light_purple>menu principal (/menu)</light_purple><white> pour pouvoir ouvrir le menu et voir quelles quêtes vous pouvez accomplir</white>
feature.milestones.tutorial.quest.open_quest.description.2=<dark_gray><italic>Cela va pouvoir vous lancer dans l'aventure et vous donner des défis afin de vous diversifier !</italic></dark_gray>
feature.milestones.tutorial.quest.open_quest.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Les </white><blue>quêtes</blue><white> vous serviront à vous procurer de l'argent facilement pour le </white><blue>début de jeu</blue><white> ! Vous pouvez tenter d'accomplir la </white><blue>tâche</blue><white> que vous voulez !</white>

feature.milestones.tutorial.quest.open_contest.name=Ouvrez le menu des contests
feature.milestones.tutorial.quest.open_contest.description.1=<white>Tapez </white><light_purple>/contest</light_purple><white> ou bien aller dans le </white><light_purple>menu principal (/menu)</light_purple><white> pour pouvoir ouvrir le menu</white>
feature.milestones.tutorial.quest.open_contest.description.2=<dark_gray><italic>Une méthode compétitive pour gagner des grosses récompenses !</italic></dark_gray>
feature.milestones.tutorial.quest.open_contest.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Les </white><gold>contests</gold><white> opposent 2 groupes sur un thème, les gagnants remportent une grosse récompense ! Et voila le tutoriel est maintenant terminé, allez récupérer votre récompense dans la </white><blue>mailbox</blue><white>, un système de lettre pour recevoir ou bien envoyer des lettres !</white>

feature.milestones.tutorial.quest.open_adminshop.name=Ouvrir le menu de l'adminshop
feature.milestones.tutorial.quest.open_adminshop.description.1=<white>Tapez </white><red>/adminshop</red><white> ou bien allez dans le </white><light_purple>menu principal (/menu)</light_purple><white> pour pouvoir ouvrir le menu</white>
feature.milestones.tutorial.quest.open_adminshop.description.2=<dark_gray><italic>Le marché qui varie en fonction de l'offre et de la demande !</italic></dark_gray>
feature.milestones.tutorial.quest.open_adminshop.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! L'</white><red>adminshop</red><white> vous servira à vous procurer de l'argent et des blocs ! Vous pouvez d'ailleurs dès maintenant vendre ou acheter une ressource à l'adminshop !</white>

feature.milestones.tutorial.quest.home_upgrade.name=Améliorer votre limite de homes
feature.milestones.tutorial.quest.home_upgrade.description.1=<white>Tapez </white><light_purple>/upgradehome</light_purple><white> ou bien aller dans le </white><light_purple>menu des homes (/homes)</light_purple>
feature.milestones.tutorial.quest.home_upgrade.description.2=<white>pour pouvoir améliorer votre limite de homes</white>
feature.milestones.tutorial.quest.home_upgrade.description.3=<dark_gray><italic>Cela vous permettra d'avoir plus de homes !</italic></dark_gray>
feature.milestones.tutorial.quest.home_upgrade.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Les </white><dark_green>homes</dark_green><white> vous seront très utile pour vous déplacer rapidement entre vos bases ! maintenant, je pense que vous avez besoin de challenges ! Ouvrez le menu des </white><blue>quêtes</blue><white>.</white>

feature.milestones.tutorial.quest.home_create.name=Poser un home
feature.milestones.tutorial.quest.home_create.description.1=<white>Tapez </white><light_purple>/sethome</light_purple><white> en étant là où vous voulez poser votre home</white>
feature.milestones.tutorial.quest.home_create.description.2=<dark_gray><italic>C'est très utile d'en faire un pour se téléporter à sa base !</italic></dark_gray>
feature.milestones.tutorial.quest.home_create.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Les homes sont souvent utilisés pour ne pas perdre votre base ! Vous êtes limité à avoir que 1 home au début. Il va falloir penser à les améliorer...</white>

feature.milestones.tutorial.quest.finish_quest.name=Accomplir une quête
feature.milestones.tutorial.quest.finish_quest.description.1=<white>Accomplissez une quête de votre choix</white>
feature.milestones.tutorial.quest.finish_quest.description.2=<dark_gray><italic>Cela va pouvoir vous donner de l'argent ou certaines ressources !</italic></dark_gray>
feature.milestones.tutorial.quest.finish_quest.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Et voici une </white><blue>récompense</blue><white> ! Pratique, non ? Allons découvrir une autre méthode de production d'argent et de consommation ! Allez dans l'</white><red>adminshop</red><white>, un endroit où plusieurs items sont achetable à des prix variants en fonction l'</white><red>offre et la demande</red><white> !</white>

feature.milestones.tutorial.quest.claim_letter.name=Ouvrir la lettre des récompenses
feature.milestones.tutorial.quest.claim_letter.description.1=<white>Tapez </white><light_purple>/mailbox</light_purple><white> ou bien allez dans le </white><light_purple>menu principal (/menu)</light_purple><white> pour pouvoir ouvrir le menu mailbox</white>
feature.milestones.tutorial.quest.claim_letter.description.2=<dark_gray><italic>Un moyen efficace d'envoyer des items à d'autres joueurs !</italic></dark_gray>
feature.milestones.tutorial.quest.claim_letter.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Vous avez découvert les bases d'OpenMC. Et maintenant, libre à vous d'aller découvrir les features par vous même ! Sur ce, nous vous souhaitons le meilleur de votre aventure sur </white><light_purple>OpenMC</light_purple><white> !</white>

feature.milestones.tutorial.quest.city_create.name=Créer/Rejoindre une ville
feature.milestones.tutorial.quest.city_create.description.1=<white>Faites </white><light_purple>/city</light_purple><white> pour commencer à créer votre ville</white>
feature.milestones.tutorial.quest.city_create.description.2=<white>ou bien rejoindre une ville à l'aide d'une invitation !</white>
feature.milestones.tutorial.quest.city_create.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Cette version d'OpenMC est centrée autour des villes. Vous y trouverez une </white><yellow>milestone spéciale pour les villes</yellow><white> (/city milestone) qui vous guidera dans cette aventure singulière ! Et si vous passiez votre ville au </white><dark_aqua>niveau 2</dark_aqua><white> ?</white>

feature.milestones.tutorial.quest.city_level_two.name=Avoir une ville niveau 2
feature.milestones.tutorial.quest.city_level_two.description.1=<white>Faites </white><light_purple>/city milestone</light_purple><white> pour en savoir plus comment</white>
feature.milestones.tutorial.quest.city_level_two.description.2=<white>améliorer votre ville !</white>
feature.milestones.tutorial.quest.city_level_two.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Vous êtes bien parti pour découvrir toutes les features qu'ils se cachent dans les villes ! Mais avant cela, je voudrais que vous posiez un </white><dark_green>home</dark_green><white>.</white>

feature.milestones.tutorial.quest.break_aywenite.name=Casser 30 Aywenites
feature.milestones.tutorial.quest.break_aywenite.description.1=<white>Le nouveau minerai de la </white><light_purple>V2</light_purple><white>, trouvable dans les grottes</white>
feature.milestones.tutorial.quest.break_aywenite.description.2=<white>Il vous sera </white><light_purple>utile</light_purple><white> dans de nombreuses fonctionnalités</white>
feature.milestones.tutorial.quest.break_aywenite.reward=<white>Bien joué ! Vous avez fini l'</white><gold>étape </gold>%1$s<white> ! Comme dit précédemment l'</white><light_purple>Aywenite</light_purple><white> est un minerai, précieux pour les features. D'ailleurs vous pouvez l'utiliser pour faire votre ville !</white>

